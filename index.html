<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTask - Modern To-Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(to right, #4776E6, #8E54E9);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .input-area {
            padding: 20px;
            display: flex;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .input-area input {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: #f0f0f0;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .input-area input:focus {
            background: #e6e6e6;
            box-shadow: 0 0 10px rgba(142, 84, 233, 0.3);
        }

        .input-area button {
            margin-left: 10px;
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(to right, #4776E6, #8E54E9);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-area button:hover {
            transform: rotate(90deg);
            box-shadow: 0 5px 15px rgba(142, 84, 233, 0.4);
        }

        .filters {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .filters button {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: transparent;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filters button:hover, .filters button.active {
            background: linear-gradient(to right, #4776E6, #8E54E9);
            color: white;
            box-shadow: 0 5px 10px rgba(142, 84, 233, 0.3);
        }

        .task-list {
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .task {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.5s;
            transition: transform 0.3s;
        }

        .task:hover {
            transform: translateY(-3px);
        }

        .task input[type="checkbox"] {
            margin-right: 15px;
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            word-break: break-word;
        }

        .task.completed .task-text {
            text-decoration: line-through;
            color: #888;
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .task-actions button {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .task-actions .edit-btn {
            color: #4776E6;
        }

        .task-actions .delete-btn {
            color: #ff4757;
        }

        .task-actions button:hover {
            transform: scale(1.2);
        }

        .stats {
            padding: 15px;
            text-align: center;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #666;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) {
            .container {
                border-radius: 15px;
            }
            
            .header {
                padding: 20px;
            }
            
            .input-area {
                padding: 15px;
            }
            
            .task-list {
                padding: 15px;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #4776E6, #8E54E9);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #3c65c9, #7d48d1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-tasks"></i> NexTask</h1>
            <p>Your modern task manager</p>
        </div>
        
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            <button id="addTaskBtn"><i class="fas fa-plus"></i></button>
        </div>
        
        <div class="filters">
            <button class="active" data-filter="all">All</button>
            <button data-filter="active">Active</button>
            <button data-filter="completed">Completed</button>
        </div>
        
        <div class="task-list" id="taskList">
            <!-- Tasks will be added here dynamically -->
        </div>
        
        <div class="stats">
            <span id="taskCount">0 tasks remaining</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const taskInput = document.getElementById('taskInput');
            const addTaskBtn = document.getElementById('addTaskBtn');
            const taskList = document.getElementById('taskList');
            const taskCount = document.getElementById('taskCount');
            const filterButtons = document.querySelectorAll('.filters button');
            
            let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            let currentFilter = 'all';
            
            // Add task function
            function addTask() {
                const taskText = taskInput.value.trim();
                if (taskText === '') return;
                
                const task = {
                    id: Date.now(),
                    text: taskText,
                    completed: false,
                    timestamp: new Date().toISOString()
                };
                
                tasks.push(task);
                saveTasks();
                renderTasks();
                taskInput.value = '';
                taskInput.focus();
            }
            
            // Save tasks to localStorage
            function saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(tasks));
                updateTaskCount();
            }
            
            // Render tasks based on current filter
            function renderTasks() {
                taskList.innerHTML = '';
                
                let filteredTasks = tasks;
                if (currentFilter === 'active') {
                    filteredTasks = tasks.filter(task => !task.completed);
                } else if (currentFilter === 'completed') {
                    filteredTasks = tasks.filter(task => task.completed);
                }
                
                filteredTasks.forEach(task => {
                    const taskElement = document.createElement('div');
                    taskElement.className = `task ${task.completed ? 'completed' : ''}`;
                    taskElement.setAttribute('data-id', task.id);
                    
                    taskElement.innerHTML = `
                        <input type="checkbox" ${task.completed ? 'checked' : ''}>
                        <span class="task-text">${task.text}</span>
                        <div class="task-actions">
                            <button class="edit-btn"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                    
                    taskList.appendChild(taskElement);
                });
                
                // Add event listeners to the new elements
                document.querySelectorAll('.task input[type="checkbox"]').forEach(checkbox => {
                    checkbox.addEventListener('change', toggleTask);
                });
                
                document.querySelectorAll('.delete-btn').forEach(button => {
                    button.addEventListener('click', deleteTask);
                });
                
                document.querySelectorAll('.edit-btn').forEach(button => {
                    button.addEventListener('click', editTask);
                });
            }
            
            // Toggle task completion
            function toggleTask(e) {
                const taskId = parseInt(e.target.closest('.task').getAttribute('data-id'));
                tasks = tasks.map(task => 
                    task.id === taskId ? {...task, completed: !task.completed} : task
                );
                saveTasks();
                renderTasks();
            }
            
            // Delete task
            function deleteTask(e) {
                const taskId = parseInt(e.target.closest('.task').getAttribute('data-id'));
                tasks = tasks.filter(task => task.id !== taskId);
                saveTasks();
                renderTasks();
            }
            
            // Edit task
            function editTask(e) {
                const taskElement = e.target.closest('.task');
                const taskId = parseInt(taskElement.getAttribute('data-id'));
                const task = tasks.find(task => task.id === taskId);
                
                const newText = prompt('Edit your task:', task.text);
                if (newText !== null && newText.trim() !== '') {
                    task.text = newText.trim();
                    saveTasks();
                    renderTasks();
                }
            }
            
            // Update task count
            function updateTaskCount() {
                const activeTasks = tasks.filter(task => !task.completed).length;
                taskCount.textContent = `${activeTasks} task${activeTasks !== 1 ? 's' : ''} remaining`;
            }
            
            // Set filter
            function setFilter(e) {
                currentFilter = e.target.getAttribute('data-filter');
                
                filterButtons.forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                
                renderTasks();
            }
            
            // Event listeners
            addTaskBtn.addEventListener('click', addTask);
            
            taskInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addTask();
                }
            });
            
            filterButtons.forEach(button => {
                button.addEventListener('click', setFilter);
            });
            
            // Initial render
            renderTasks();
            updateTaskCount();
        });
    </script>
</body>
</html>
